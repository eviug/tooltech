<html>
<head><title>Sample</title>
</head>
<body><section class="hero-slider">
  <div class="slide active">
    <img src="https://picsum.photos/id/1/1200/600" alt="Slide 1">
    <div class="content">
      <h1>Quality Tools</h1>
      <p>Professional equipment for every project.</p>
    </div>
  </div>

  <div class="slide">
    <img src="https://picsum.photos/id/20/1200/600" alt="Slide 2">
    <div class="content">
      <h1>Fast Delivery</h1>
      <p>Get your tools delivered right to your doorstep.</p>
    </div>
  </div>

  <div class="slide">
    <img src="https://picsum.photos/id/30/1200/600" alt="Slide 3">
    <div class="content">
      <h1>Best Prices</h1>
      <p>Affordable tools without compromising quality.</p>
    </div>
  </div>
</section>

<style>
.hero-slider{
    position:relative;
    width:100%;
    height:500px;
    overflow:hidden;
}

.slide{
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
    transform:scale(1.05);
    transition:opacity 1s ease, transform 1s ease;
}

.slide.active{
    opacity:1;
    transform:scale(1);
    z-index:1;
}

.slide img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.content{
    position:absolute;
    top:50%;
    left:10%;
    transform:translateY(-50%);
    color:white;
    max-width:500px;
    animation:slideUp 1s ease;
}

.content h1{
    font-size:3rem;
    margin-bottom:10px;
}

.content p{
    font-size:1.2rem;
}

.slide::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.45);
}

@keyframes slideUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:768px){
    .hero-slider{
        height:350px;
    }

    .content h1{
        font-size:2rem;
    }

    .content p{
        font-size:1rem;
    }
}
</style>

<script>
const slides = document.querySelectorAll(".slide");
let current = 0;

function showSlide(index){
    slides.forEach(slide => slide.classList.remove("active"));
    slides[index].classList.add("active");
}

setInterval(() => {
    current = (current + 1) % slides.length;
    showSlide(current);
}, 5000);
</script>
</body>
</html>
