<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tooltech Shop</title>
    
<style>

</style>
<link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav class="navbar" id="navbar">
        <div class="company-name">
          <h3><a href="index.html">Tooltech</a></h3>
          <p>technologies</p>
        </div>

        <div class="nav-links" id="navLinks">
          <a href="about.html">Info</a>
<a href="https://wa.me/256741003162" target="_blank">chat</a>
<a href="tel:+256741003162">Call Us</a>
        </div>
         <button id="cartBtn" onclick="openCart()" style="background:#F900FE;color:white;border:none;padding:10px 15px;border-radius:5px;cursor:pointer;">🛒 Cart (<span id="cartCount">0</span>)</button>
<div class="hamburger" id="hamburger" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>
      </nav>
    </header>

    <!-- SLIDER -->
    <section class="slider">
      <img class="slide active" src="img/it-lab.webp" />
      <img class="slide" src="img/it-lab.webp" />
      <img class="slide" src="img/bspwm.png" />

      <div class="hero-text">
        <h2>Tooltech Technologies</h2>
      </div>
    </section>

    <!-- TABS -->
    <div id="tabContent">Click a tab to view featured items</div>
    <div class="tabs">
      <button class="offer" onclick="showTab('offers')">
        Offer of the Day
      </button>
      <button class="coming" onclick="showTab('coming')">Coming Soon</button>
    </div>

    <!-- ALWAYS VISIBLE PRODUCTS SECTION -->
    <h2 class="section-title">All Products</h2>
    <div class="product-grid" id="productGrid"></div>

    <!-- MODAL -->
    <div class="modal" id="modal" onclick="closeModal()">
      <div class="modal-box" onclick="event.stopPropagation()">
        <img id="mImg" />
        <h3 id="mName"></h3>
        <p id="mDesc"></p>
        <p id="mPrice"></p>
      </div>
    </div>

    
<div class="modal" id="cartModal">
  <div class="modal-box" style="width:90%;max-width:500px;">
    <h2>Shopping Cart</h2>
    <div id="cartItems"></div><br>
    <button style="background:#F900FE;color:#fff;padding:10px 20px;border:none;border-radius:5px;" onclick="sendCartWhatsApp()">Checkout via WhatsApp</button>
    <button style="background:#555;color:#fff;padding:10px 20px;border:none;border-radius:5px;margin-left:10px;" onclick="closeCart()">Close</button>
  </div>
</div>
<script src="script.js"></script>
  </body>
</html>
